# config.toml — 非敏感配置

[dingtalk]
default_table = "zhuozhi-base"  # 默认使用的表格 key

# 表格 1：卓芝基础生图
[[dingtalk.tables]]
key = "zhuozhi-base"
base_id = "ZgpG2NdyVX6bMqMaTGgr2nLG8MwvDqPk"
sheet_id = "hERWDMS"
image_api_key_env = "ZHUOZHI_IMAGE_API_KEY"
prompt_field = "提示词"
model_field = "生图模型"
reference_image_field = "素材图"
result_image_field = "生成图片"
result_status_field = "生成结果"
result_time_field = "生成时间"

# 表格 2：画朴基础生图
[[dingtalk.tables]]
key = "huapu-base"
base_id = "qnYMoO1rWxnLBYBbSzQ1KEQBJ47Z3je9"
sheet_id = "hERWDMS"
image_api_key_env = "HUAPU_IMAGE_API_KEY"
prompt_field = "提示词"
model_field = "生图模型"
reference_image_field = "素材图"
result_image_field = "生成图片"
result_status_field = "生成结果"
result_time_field = "生成时间"

# 表格 3：AHMI基础生图
[[dingtalk.tables]]
key = "ahmi-base"
base_id = "YMyQA2dXW7lPDdDrT5M7MOORVzlwrZgb"
sheet_id = "hERWDMS"
image_api_key_env = "AHMI_IMAGE_API_KEY"
prompt_field = "提示词"
model_field = "生图模型"
reference_image_field = "素材图"
result_image_field = "生成图片"
result_status_field = "生成结果"
result_time_field = "生成时间"

[server]
host = "0.0.0.0"
port = 8030
log_level = "INFO"
max_concurrency = 2

[ai]
default_model = "Nano Banana 2"

[ai.retry]
initial_delay = 2
max_retries = 1

[ai.model."Nano Banana Pro"]
base_url = "https://api.vectorengine.ai"
model_name = "gemini-3-pro-image-preview"
provider = "google"

[ai.model."Nano Banana 2"]
base_url = "https://api.vectorengine.ai"
model_name = "gemini-3.1-flash-image-preview"
provider = "google"

[ai.model."GPT Image 2"]
base_url = "https://api.vectorengine.ai/v1"
model_name = "gpt-image-2"
provider = "openai"

# ===== 视频生成 =====

# 视频轮询策略
[ai.video.poll]
initial_wait = 10  # 首次轮询前等待（秒）
interval = 5       # 轮询间隔（秒）
max_total = 600    # 总超时（秒），默认 10 分钟

# 视频厂商基础配置（model_name 由钉钉表格透传，不在此处配置）
[ai.video_provider."kling"]
base_url = "https://api.vectorengine.ai"

[ai.video_provider."hailuo"]
base_url = "https://api.vectorengine.ai"

[ai.video_provider."wanxiang"]
base_url = "https://api.vectorengine.ai"

# 视频表格配置（与图片表独立）
# 钉钉 base_id / sheet_id 需用户填实际值后端到端运行
# 复用同品牌图片表的 API Key（vectorengine 中转站同一账号 image/video 通用）
[[dingtalk.video_tables]]
key = "zhuozhi-video"
base_id = "<待补>"
sheet_id = "<待补>"
video_api_key_env = "ZHUOZHI_IMAGE_API_KEY"

[[dingtalk.video_tables]]
key = "huapu-video"
base_id = "<待补>"
sheet_id = "<待补>"
video_api_key_env = "HUAPU_IMAGE_API_KEY"

[[dingtalk.video_tables]]
key = "ahmi-video"
base_id = "<待补>"
