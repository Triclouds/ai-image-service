# ===== 搜推素材生图配置 =====
# 任务 B：搜推素材 sheet（与 zhuozhi-base 同一 base，不同 sheet）
[[dingtalk.tables]]
key = "zhuozhi-sousuo"
base_id = "ZgpG2NdyVX6bMqMaTGgr2nLG8MwvDqPk"
sheet_id = "J7GxM8e"
image_api_key_env = "ZHUOZHI_IMAGE_API_KEY"      # 复用现有 Key，无需新增

batch_mode = true
task_name = "搜推素材"                            # 提示词表"任务名称"列里精确匹配的值
prompt_table_sheet_id = "42YsOaT"

# 字段映射（按搜推素材任务表实际列名调整）
model_field = "生图模型"
reference_image_field = "素材图"
result_image_field = "场景图"                                                # 图片回传字段（已从"生成结果"改为"场景图"）
result_status_field = "生成结果"                                             # 状态回传字段（原"状态"是 singleSelect，改用文本字段）
result_time_field = "生成时间"
style_code_field = "款号"

# 搜推素材特有：三段式提示词 + 自定义文件名（仅本表启用，其他表全为默认）
prompt_section_mode = true                                                   # 启用分段模式；其他表为 false / 不配置
section_marker_pattern = "^([一二三四五六七八九十]+)、"                       # 识别"一、" "二、" "三、" 标题
output_order = ["场景图"]                                                    # 只输出场景图一段，3 张连续编号 1-3
count_per_section = 3                                                       # 每段抽几张
shop_code_field = "店铺"                                                     # 店铺编码提取源（singleSelect）
shop_code_separator = ","                                                   # 取最后 separator 后的部分
goods_id_field = "商品ID"                                                    # 商品 ID 字段名（用于文件名）

[dingtalk.tables.prompt_table]
prompt_field = "提示词"
generate_type_field = "生成类型"
count_field = "生成数量"
aspect_ratio_field = "生成比例"
resolution_field = "分辨率"
perturbations_field = "扰动列表"

[dingtalk.tables.section_titles]
"场景图、" = "场景图"
"白底图、" = "白底图"
