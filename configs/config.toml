# 说明：
# "状态" 字段是 singleSelect 枚举类型（待生成/已确认/已上传 等业务侧语义），
# 现有 _update_failure 写 "成功"/"失败: ..." 字符串对该字段可能写入失败，
# 但被 _update_failure 内部 try/except 兜住，仅记 warning，不影响生图主流程。
# 业务如需在"状态"字段精确反映生图结果，可后续：
#   1) 在钉钉端给"状态"字段新增"生图成功"/"生图失败"枚举值；并
#   2) 在 config 里把 result_status_field 改成接收新枚举值的字段，或扩展 TableConfig + _update_failure。
# 当前 PR 不动 Python 代码，避免影响其他表格（zhuozhi-base/huapu-base/ahmi-base/ahmi-batch-action）的状态写回语义。